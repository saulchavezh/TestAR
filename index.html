<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Mecanismo AR Profesional con Efectos</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }
        .rotation-controls {
            position: absolute;
            top: 25px; left: 25px;
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 10px;
            pointer-events: auto;
        }
        .btn {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 50%;
            color: white; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #speed-container {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 30px;
            pointer-events: auto;
            text-align: center;
            color: white;
        }
        input[type=range] { width: 200px; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="rotation-controls">
            <div style="grid-area: up" class="btn" id="up">▲</div>
            <div style="grid-area: left" class="btn" id="left">◀</div>
            <div style="grid-area: right" class="btn" id="right">▶</div>
            <div style="grid-area: down" class="btn" id="down">▼</div>
        </div>

        <div id="speed-container">
            <label>Velocidad Máxima para Efectos</label><br>
            <input type="range" id="speedSlider" min="0" max="2" step="0.1" value="1">
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo-engranes" src="engranes.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="modelo3D" 
                      gltf-model="#modelo-engranes" 
                      position="0 0 0" 
                      rotation="90 0 0" 
                      scale="0.5 0.5 0.5"
                      animation-mixer="loop: repeat; timeScale: 1; crossFadeDuration: 0">
                
                <a-entity id="efectoChispas" 
                          position="0 0 0" 
                          visible="false"
                          particle-system="color: #FFD700, #FFA500; size: 0.1; particleCount: 150; velocityValue: 0 2 0; velocitySpread: 2 1 2; accelerationValue: 0 -3 0">
                </a-entity>

                <a-entity id="efectoHumo" 
                          position="0 0.2 0" 
                          visible="false"
                          particle-system="preset: dust; color: #CCCCCC; size: 1.2; opacity: 0.4; particleCount: 30; velocityValue: 0 0.4 0">
                </a-entity>

            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.6"></a-light>
    </a-scene>

    <script>
        const model = document.querySelector('#modelo3D');
        const slider = document.querySelector('#speedSlider');
        const chispas = document.querySelector('#efectoChispas');
        const humo = document.querySelector('#efectoHumo');

        // --- LÓGICA DE ROTACIÓN (Tu código original) ---
        let rotX = 90; let rotY = 0;
        const step = 15;
        document.getElementById('left').addEventListener('click', () => { rotY += step; updateRot(); });
        document.getElementById('right').addEventListener('click', () => { rotY -= step; updateRot(); });
        document.getElementById('up').addEventListener('click', () => { rotX -= step; updateRot(); });
        document.getElementById('down').addEventListener('click', () => { rotX += step; updateRot(); });

        function updateRot() { model.setAttribute('rotation', `${rotX} ${rotY} 0`); }

        // --- LÓGICA DE VELOCIDAD Y EFECTOS ---
        slider.addEventListener('input', (e) => {
            const speed = parseFloat(e.target.value);
            
            // Actualizar la animación del modelo
            if (model.components['animation-mixer']) {
                model.setAttribute('animation-mixer', 'timeScale', speed);
            }

            // ACTIVAR EFECTOS SOLO EN VELOCIDAD MÁXIMA (2.0)
            if (speed >= 2.0) {
                chispas.setAttribute('visible', 'true');
                humo.setAttribute('visible', 'true');
            } else {
                chispas.setAttribute('visible', 'false');
                humo.setAttribute('visible', 'false');
            }
        });
    </script>
</body>
</html>
