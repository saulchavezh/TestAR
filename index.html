<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

      /* CAPA DE INTERFAZ: Forzamos que esté arriba de todo */
      #ui-overlay {
        position: fixed; /* Fixed es más seguro que absolute para UI móvil */
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        pointer-events: none; /* Deja pasar los toques al 3D si no hay botones */
        z-index: 9999; /* Prioridad máxima */
      }

      /* Panel de Flechas */
      .rotation-controls {
        position: absolute;
        top: 20px; left: 20px;
        display: grid;
        grid-template-areas: 
          ". up ."
          "left . right"
          ". down .";
        gap: 8px;
        pointer-events: auto; /* Reactiva el toque para los botones */
      }

      .btn {
        width: 55px; height: 55px;
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid #4285f4;
        border-radius: 12px;
        font-size: 24px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
      .btn:active { background: #4285f4; color: white; transform: scale(0.95); }

      #up { grid-area: up; } #down { grid-area: down; }
      #left { grid-area: left; } #right { grid-area: right; }

      /* Panel de Velocidad */
      .speed-panel {
        position: absolute;
        bottom: 40px; left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.9);
        padding: 15px 25px;
        border-radius: 25px;
        width: 70%; max-width: 280px;
        text-align: center;
        pointer-events: auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      input[type=range] { width: 100%; accent-color: #4285f4; height: 30px; }
      
      strong { color: #333; display: block; margin-bottom: 5px; }
    </style>
  </head>
  <body>

    <div id="ui-overlay">
      <div class="rotation-controls">
        <div class="btn" id="up">⬆️</div>
        <div class="btn" id="left">⬅️</div>
        <div class="btn" id="right">➡️</div>
        <div class="btn" id="down">⬇️</div>
      </div>

      <div class="speed-panel">
        <strong>Velocidad del Mecanismo</strong>
        <input type="range" id="speed" min="0" max="3" step="0.1" value="1">
      </div>
    </div>
    
    <a-scene mindar-image="imageTargetSrc: targets.mind; uiScanning: no; uiLoading: no;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, exposure: 1.2" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="engranesModel" src="engranes.glb"></a-asset-item>
        <img id="refMap" src="reflexion.jpg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="modelo3D" 
                      src="#engranesModel" 
                      rotation="90 0 0" 
                      position="0 0 0" 
                      scale="0.5 0.5 0.5"
                      animation-mixer="clip: *; timeScale: 1; loop: repeat;"
                      environment="map: #refMap; intensity: 1.5;">
        </a-gltf-model>
      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
    </a-scene>

    <script>
      const model = document.querySelector('#modelo3D');
      const target = document.querySelector('#target');
      const slider = document.querySelector('#speed');

      // Rotación
      let rotX = 90; let rotY = 0;
      const step = 15;

      document.getElementById('left').addEventListener('click', () => { rotY += step; updateRot(); });
      document.getElementById('right').addEventListener('click', () => { rotY -= step; updateRot(); });
      document.getElementById('up').addEventListener('click', () => { rotX -= step; updateRot(); });
      document.getElementById('down').addEventListener('click', () => { rotX += step; updateRot(); });

      function updateRot() { model.setAttribute('rotation', `${rotX} ${rotY} 0`); }

      // Animación al encontrar imagen
      target.addEventListener("targetFound", () => {
        model.setAttribute('animation-mixer', {clip: '*', timeScale: slider.value});
      });

      // Slider
      slider.addEventListener('input', (e) => {
        const speed = parseFloat(e.target.value);
        if (model.components['animation-mixer']) {
          model.setAttribute('animation-mixer', 'timeScale', speed);
        }
      });
    </script>
  </body>
</html>
