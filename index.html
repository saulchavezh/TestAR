<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Mecanismo AR Corregido</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .controls { pointer-events: auto; position: absolute; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; color: white; }
        #speed-ctrl { bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; }
        #rot-ctrl { top: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 40px); gap: 5px; }
        .btn { width: 40px; height: 40px; background: white; color: black; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="rot-ctrl" class="controls">
            <div></div><button class="btn" id="up">▲</button><div></div>
            <button class="btn" id="left">◀</button><div></div><button class="btn" id="right">▶</button>
            <div></div><button class="btn" id="down">▼</button><div></div>
        </div>

        <div id="speed-ctrl" class="controls">
            <label>Velocidad (Máximo para Efectos)</label><br>
            <input type="range" id="speedSlider" min="0" max="2" step="0.1" value="1">
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             embedded color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo-engranes" src="engranes.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="modelo3D" 
                      gltf-model="#modelo-engranes" 
                      rotation="90 0 0" 
                      scale="0.5 0.5 0.5"
                      animation-mixer="timeScale: 1">
                
                <a-entity id="chispas" position="0 0 0.1" visible="false"
                          particle-system="color: #FFD700; particleCount: 200; size: 0.05; velocityValue: 0 2 0"></a-entity>
                
                <a-entity id="humo" position="0 0.2 0" visible="false"
                          particle-system="preset: dust; color: #AAAAAA; particleCount: 50; size: 1"></a-entity>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
        // Variables
        const model = document.querySelector('#modelo3D');
        const slider = document.querySelector('#speedSlider');
        const chispas = document.querySelector('#chispas');
        const humo = document.querySelector('#humo');

        // Rotación
        let rX = 90; let rY = 0;
        document.getElementById('up').onclick = () => { rX -= 10; updateR(); };
        document.getElementById('down').onclick = () => { rX += 10; updateR(); };
        document.getElementById('left').onclick = () => { rY -= 10; updateR(); };
        document.getElementById('right').onclick = () => { rY += 10; updateR(); };
        function updateR() { model.setAttribute('rotation', `${rX} ${rY} 0`); }

        // Slider y Efectos
        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            model.setAttribute('animation-mixer', 'timeScale', val);

            // Activación estricta en el valor máximo
            const show = val >= 2.0;
            chispas.setAttribute('visible', show);
            humo.setAttribute('visible', show);
        });
    </script>
</body>
</html>
