<a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="modelo3D" 
                      src="#engranesModel" 
                      rotation="90 0 0" 
                      position="0 0 0" 
                      scale="0.5 0.5 0.5"
                      animation-mixer="clip: *; loop: repeat; timeScale: 1">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <div id="controls">
      <strong>Velocidad del Mecanismo</strong><br><br>
      <input type="range" id="speed" min="0" max="3" step="0.1" value="1">
    </div>

    <script>
      const model = document.querySelector('#modelo3D');
      const slider = document.querySelector('#speed');

      slider.addEventListener('input', (e) => {
        const speed = parseFloat(e.target.value);
        // CAMBIO AQUÍ: Usamos una forma más robusta de actualizar solo la velocidad
        model.setAttribute('animation-mixer', 'timeScale', speed);
      });

      // TRUCO EXTRA: Forzar el inicio de la animación cuando el modelo cargue
      model.addEventListener('model-loaded', () => {
        console.log("Modelo cargado correctamente");
        model.setAttribute('animation-mixer', {clip: '*', timeScale: slider.value});
      });
    </script>
