<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    
    <a-scene mindar-image="imageTargetSrc: targets.mind; uiScanning: no;" 
             renderer="colorManagement: true; exposure: 1.0;"
             vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo" src="engranes.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#modelo" 
                          rotation="90 0 0" 
                          position="0 0 0" 
                          scale="0.5 0.5 0.5"
                          animation-mixer="loop: repeat; timeScale: 0.5; clampWhenFinished: false; crossFadeDuration: 0">
            </a-gltf-model>
        </a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>
    </a-scene>
</body>
</html>
