<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #controls {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 80%; max-width: 300px; background: white; padding: 15px;
        border-radius: 15px; z-index: 999; text-align: center; font-family: sans-serif;
      }
      input[type=range] { width: 100%; accent-color: #4285f4; }
    </style>
  </head>
  <body>
    
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="engranesModel" src="engranes.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-gltf-model id="modelo3D" 
                      src="#engranesModel" 
                      rotation="90 0 0" 
                      position="0 0 0" 
                      scale="0.5 0.5 0.5"
                      animation-mixer="clip: *; timeScale: 1; loop: repeat;">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <div id="controls">
      <strong>Velocidad del Mecanismo</strong><br>
      <input type="range" id="speed" min="0" max="3" step="0.1" value="1">
    </div>

    <script>
      const model = document.querySelector('#modelo3D');
      const target = document.querySelector('#target');
      const slider = document.querySelector('#speed');

      // 1. FORZAR PLAY AL DETECTAR LA IMAGEN
      target.addEventListener("targetFound", event => {
        console.log("¡Imagen encontrada! Arrancando motores...");
        // Esto refresca el componente para que empiece a girar
        model.setAttribute('animation-mixer', {clip: '*', timeScale: slider.value});
      });

      // 2. CONTROL DEL SLIDER
      slider.addEventListener('input', (e) => {
        const speed = parseFloat(e.target.value);
        // Actualización directa de la propiedad timeScale
        if (model.components['animation-mixer']) {
          model.setAttribute('animation-mixer', 'timeScale', speed);
        }
      });
    </script>
  </body>
</html>
